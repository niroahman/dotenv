# source-file ~/.config/tmux/tmux.reset.conf
set-option -g default-terminal 'screen-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'

set -g prefix C-Space
bind C-Space send-prefix
set -g base-index 1              # start indexing windows at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g extended-keys on          # pass modifier keys (e.g. Shift+Enter) through to apps
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g status-position top       # macOS / darwin style
setw -g mode-keys vi
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# smart-splits.nvim tmux integration (replaces vim-tmux-navigator)
bind-key -n C-h if -F "#{@pane-is-vim}" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if -F "#{@pane-is-vim}" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if -F "#{@pane-is-vim}" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if -F "#{@pane-is-vim}" 'send-keys C-l' 'select-pane -R'
bind-key -n M-h if -F "#{@pane-is-vim}" 'send-keys M-h' 'resize-pane -L 3'
bind-key -n M-j if -F "#{@pane-is-vim}" 'send-keys M-j' 'resize-pane -D 3'
bind-key -n M-k if -F "#{@pane-is-vim}" 'send-keys M-k' 'resize-pane -U 3'
bind-key -n M-l if -F "#{@pane-is-vim}" 'send-keys M-l' 'resize-pane -R 3'
set-hook -g pane-focus-in 'run "tmux set-option -p @pane-is-vim $(ps -o comm= -t $(tmux display-message -p \#{pane_tty}) | grep -cE \"^g?(view|n?vim?x?)(diff)?$\" | xargs)"'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'craftzdog/tmux-claude-session-manager'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'
set -g @sessionx-bind-zo-new-window 'ctrl-y'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-custom-paths '$HOME/personal/dotenv'
set -g @sessionx-bind 'o'
set -g @sessionx-x-path '$HOME/personal/dotenv'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{b:pane_current_path}"
set -g @catppuccin_date_time_text "%H:%M"

# set -g mode-mouse on
# set -g mouse-resize-pane on
set-option -g mouse on
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"
bind m display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

source-file ~/.config/tmux/plugins/tmux/catppuccin_options_tmux.conf
source-file ~/.config/tmux/plugins/tmux/catppuccin_tmux.conf

set -g status-interval 2
set -g status-left-length 1000
set -g status-left "#{?client_prefix,#[fg=#ffffff#,bg=#ff0000#,bold] ⌨  #[default],}#(~/.config/tmux/session_list.sh '#{pane_current_path}') "
set -g status-right-length 200
set -g status-right "#[fg=#{@thm_subtext_1}]#(~/.config/tmux/session_uptime.sh '#{session_created}')  #[fg=#{@thm_lavender},bold]%H:%M#[nobold]"

set -g @vault_editor         'nvim'
set -g @vault_path           '~/personal/vault'
set -g @vault_key            'v'
set -g @vault_picker_key     'V'
set -g @vault_popup_width    '90%'
set -g @vault_popup_height   '90%'
set -g @vault_session_prefix 'vault-'

set -g @plugin 'niroahman/tmux-vault-notes'

set-environment -g PATH "/Users/niroahman/.nvm/versions/node/v24.7.0/bin:/Users/niroahman/.local/bin:/Users/niroahman/homebrew/bin:/bin:/usr/bin"
run '~/.tmux/plugins/tpm/tpm'
